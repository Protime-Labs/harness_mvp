name: harness-ci

# Runs the platform's own acceptance gate on every push/PR: the unit tests plus the
# invariant suite (the 10 machine-checked guarantees). Core is stdlib-only, so CI is
# hermetic and fast — no provider keys, no network, no heavy extras.

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  verify:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    defaults:
      run:
        working-directory: harness
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install (dev)
        run: pip install -e ".[dev]"
      - name: Unit tests
        run: python -m pytest -q
      - name: Invariant acceptance suite (mock)
        run: PYTHONPATH=src python -m harness verify
