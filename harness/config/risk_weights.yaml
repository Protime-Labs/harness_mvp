# B6 — Risk model (BF-10, PROVISIONAL). Owner: governance/risk.
# Overrides the baked-in defaults when PyYAML is installed. A transparent weighted score
# over the use-case attributes -> risk tier -> harness pack. Tune the numbers here; no code change.
weights:
  data_class:      # highest single class wins
    CPNI: 32
    PII: 30
    PHI: 35
    PCI: 30
    confidential: 20
    internal: 10
    public: 0
  exposure:
    public: 25
    private: 10
    internal: 5
  write_tools:
    present: 20
    absent: 0
  users:           # highest single user type wins
    external: 15
    partner: 10
    privileged: 10
    internal: 0
  criticality:
    tier1: 15
    tier2: 10
    tier3: 5

cutoffs:           # score thresholds for the tier
  high: 60
  medium: 30

foundational_pack: ["H2.1", "H1.2", "H1.3", "H2.3", "H5.1"]
