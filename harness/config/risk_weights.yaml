# B6 — Risk model (BF-10, PROVISIONAL). Owner: governance/risk.
# Overrides the baked-in defaults when PyYAML is installed. A transparent weighted score
# over the use-case attributes -> risk tier -> harness pack. Tune the numbers here; no code change.
weights:
  data_class:      # highest single class wins
    CPNI: 32
    PII: 30
    PHI: 35
    PCI: 30
    confidential: 20
    internal: 10
    public: 0
  exposure:
    public: 25
    private: 10
    internal: 5
  write_tools:
    present: 20
    absent: 0
  users:           # highest single user type wins
    external: 15
    partner: 10
    privileged: 10
    internal: 0
  criticality:
    tier1: 15
    tier2: 10
    tier3: 5

cutoffs:           # score thresholds for the tier
  high: 60
  medium: 30

foundational_pack: ["H2.1", "H1.2", "H1.3", "H2.3", "H5.1"]

# Per-risk-tier packs (F2): the computed tier selects the pack. MUST be nested
# (low ⊆ medium ⊆ high) so adding a risk attribute never shrinks the required set (A11).
# Omit this block entirely to fall back to `foundational_pack` for every tier.
packs:
  low:    ["H2.1", "H5.1"]
  medium: ["H2.1", "H1.2", "H2.3", "H5.1"]
  high:   ["H2.1", "H1.2", "H1.3", "H2.3", "H5.1"]

# Mandatory requirement clauses (F3): union'd onto the tier pack regardless of the score,
# so a high-signal attribute can never be diluted out of a required harness.
require_when:
  - when: { attr: data_classes, contains: PHI }
    require: ["H1.3"]
  - when: { attr: data_classes, contains: PII }
    require: ["H2.3"]
  - when: { attr: data_classes, contains: CPNI }
    require: ["H2.3"]
  - when: { attr: data_classes, contains: PCI }
    require: ["H2.3"]
  - when: { attr: write_tools, equals: true }
    require: ["H2.1"]
